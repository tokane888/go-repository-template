name: Test and Lint

on:
  push:
  pull_request:

jobs:
  find-modules:
    name: Find Go Modules
    runs-on: ubuntu-latest
    outputs:
      all-modules: ${{ steps.find.outputs.all-modules }}
      test-modules: ${{ steps.find.outputs.test-modules }}
      main-modules: ${{ steps.find.outputs.main-modules }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Find all Go modules
        id: find
        run: |
          # -x is required to print shell execution logs
          set -x
          all_modules=$(find . -name "go.mod" -print0 | xargs -0 dirname | sed 's|^\./||' | sort)
          # modules with *_test.go
          test_modules=""
          # modules with main package
          main_modules=""
          IFS=$'\n'
          for module in $all_modules; do
            if [ -n "$module" ] && test -n "$(find "$module" -name "*_test.go" -print -quit)"; then
              test_modules="$test_modules$module\n"
            fi
            # detect modules that contain a main package
            if [ -n "$module" ] && grep -r --include="*.go" -l "^package main" "$module" > /dev/null 2>&1; then
              main_modules="$main_modules$module\n"
            fi
          done
          unset IFS

          all_modules_json=$(echo "$all_modules" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          test_modules_json=$(echo -e "$test_modules" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          main_modules_json=$(echo -e "$main_modules" | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "all-modules=$all_modules_json" >> $GITHUB_OUTPUT
          echo "test-modules=$test_modules_json" >> $GITHUB_OUTPUT
          echo "main-modules=$main_modules_json" >> $GITHUB_OUTPUT

  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: find-modules
    if: ${{ needs.find-modules.outputs.test-modules != '[]' }}
    strategy:
      matrix:
        module: ${{ fromJson(needs.find-modules.outputs.test-modules) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Download dependencies
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: go test -v -cover ./...

  lint:
    name: Lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: find-modules
    strategy:
      matrix:
        module: ${{ fromJson(needs.find-modules.outputs.all-modules) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Download dependencies
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Pre-build for golangci-lint
        if: startsWith(matrix.module, 'services/')
        working-directory: ${{ matrix.module }}
        run: go build ./cmd/...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --config=${{ github.workspace }}/.golangci.yml
          working-directory: ${{ matrix.module }}
          # By default, cache is stored in `~/.cache/golangci-lint`.
          # Disabled because cache restore fails in monorepo setups.
          skip-cache: true
          # Uncomment below if you need to bypass lint/test in an emergency
          # continue-on-error: true
  deadcode:
    name: Deadcode (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: find-modules
    if: ${{ needs.find-modules.outputs.main-modules != '[]' }}
    strategy:
      matrix:
        module: ${{ fromJson(needs.find-modules.outputs.main-modules) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Install deadcode
        run: go install golang.org/x/tools/cmd/deadcode@latest

      - name: Run deadcode
        working-directory: ${{ matrix.module }}
        run: |
          output=$(deadcode ./... 2>&1)
          if [ -n "$output" ]; then
            echo "$output"
            exit 1
          fi

  spellcheck:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run cspell
        uses: streetsidesoftware/cspell-action@v8
        with:
          # check only changed files
          incremental_files_only: true
          # add warning annotations to PRs
          inline: warning
          # strict mode disabled (warnings only, does not block)
          strict: false
          # explicitly specify the cspell config file
          config: .cspell.json
        # do not fail the job even if there are errors
        continue-on-error: true
